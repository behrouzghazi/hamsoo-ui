<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود اطلاعات از طریق Excel | همسو</title>
    <script src="/node_modules/@tailwindcss/browser/dist/index.global.js"></script>
    <script src="/node_modules/lucide/dist/umd/lucide.min.js"></script>
    <link href="/node_modules/@fontsource/vazirmatn/index.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="/worklist/styles.css" />
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="flex h-screen w-full overflow-hidden">
        <aside class="w-16 bg-slate-900 flex flex-col items-center py-6 gap-6 z-30">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white mb-4">
                <a href="/index.html" aria-label="صفحه اصلی">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                </a>
            </div>

            <nav class="flex flex-col gap-4">
                <a href="/index.html" class="p-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-all" title="خانه">
                    <i data-lucide="house" class="w-6 h-6"></i>
                </a>
                <a href="/worklist/index.html" class="p-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-all" title="مدیریت درخواست‌ها">
                    <i data-lucide="git-pull-request" class="w-6 h-6"></i>
                </a>
                <button class="p-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-all" title="گزارش">
                    <i data-lucide="bar-chart-3" class="w-6 h-6"></i>
                </button>
                <button class="p-3 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-xl transition-all" title="اطلاعات پایه">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden">
            <header class="h-16 bg-blue-700 text-white border-b border-blue-800 flex items-center justify-between px-6 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-white/15 rounded-xl flex items-center justify-center">
                        <i data-lucide="sheet" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="text-sm font-bold">ورود اطلاعات از طریق Excel</div>
                        <div class="text-[11px] text-blue-100">نمونه بازطراحی سامانه همسو</div>
                    </div>
                </div>
                <a href="/index.html" class="text-xs bg-white/15 hover:bg-white/20 px-3 py-1 rounded-full transition-all">بازگشت</a>
            </header>

            <div class="flex-1 overflow-y-auto p-8">
                <section class="max-w-5xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
                    <div class="flex items-center gap-4">
                        <div class="bg-emerald-600/10 p-3 rounded-xl text-emerald-600">
                            <i data-lucide="sheet" class="w-7 h-7"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl font-extrabold text-slate-800">ورود اطلاعات از طریق Excel</h1>
                            <p class="text-sm text-slate-500 mt-1">این صفحه برای طراحی محتوای جدید ورود اطلاعات از طریق فایل Excel آماده شده است.</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
