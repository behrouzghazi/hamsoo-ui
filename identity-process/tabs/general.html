<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
    <section class="identity-panel xl:col-span-3">
        <div class="flex items-center justify-between gap-4 mb-5 border-b border-slate-200 pb-3">
            <div>
                <h2 class="font-bold text-sm text-slate-800">کلیات فرایند</h2>
                <p class="text-xs text-slate-400 mt-1">اطلاعات پایه‌ای که مالکیت، ماهیت، مأموریت و دامنه اجرای فرایند را مشخص می‌کند.</p>
            </div>
            <button class="sipoc-secondary-btn">
                <i data-lucide="save" class="w-4 h-4"></i>
                ذخیره تغییرات
            </button>
        </div>

        <form class="identity-general-form">
            <div class="identity-form-field">
                <label for="process-code">کد فرایند</label>
                <input id="process-code" value="PR-102-PROC">
            </div>

            <div class="identity-form-field">
                <label for="process-name">نام فرایند</label>
                <input id="process-name" value="مدیریت تدارکات داخلی">
            </div>

            <div class="identity-form-field">
                <label for="process-owner">مالک فرایند</label>
                <input id="process-owner" value="مدیر زنجیره تأمین">
            </div>

            <div class="identity-form-field">
                <label for="process-type">نوع فرایند</label>
                <select id="process-type">
                    <option>فرایندهای مدیریتی و پشتیبانی</option>
                    <option>فرایندهای اصلی</option>
                    <option>فرایندهای حاکمیتی</option>
                    <option>فرایندهای پشتیبانی</option>
                </select>
            </div>

            <div class="identity-form-field md:col-span-2">
                <label for="process-mission">مأموریت</label>
                <textarea id="process-mission" rows="4">تأمین به‌موقع کالا و خدمات مورد نیاز سازمان با رعایت الزامات بودجه، کیفیت، شفافیت و کنترل‌های داخلی.</textarea>
            </div>

            <div class="identity-form-field md:col-span-2">
                <label for="process-scope">محدوده</label>
                <textarea id="process-scope" rows="4">از ثبت نیاز خرید در واحد متقاضی تا انتخاب تأمین‌کننده، صدور سفارش، دریافت کالا یا خدمت، کنترل نهایی و بستن درخواست خرید.</textarea>
            </div>
        </form>
    </section>

    <aside class="identity-panel" data-mechanized-card>
        <div class="flex items-center gap-2 mb-4">
            <span class="w-9 h-9 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center">
                <i data-lucide="cpu" class="w-5 h-5"></i>
            </span>
            <div>
                <h3 class="font-bold text-sm text-slate-800">درصد اجرای مکانیزه</h3>
                <p class="text-[11px] text-slate-400 mt-1">سهم اجرای فرایند در سامانه‌ها</p>
            </div>
        </div>

        <div class="mechanized-meter" data-mechanized-meter>
            <strong data-mechanized-output>۶۳٪</strong>
            <span>مکانیزه</span>
        </div>

        <input
            class="identity-range"
            type="range"
            min="0"
            max="100"
            value="63"
            oninput="this.closest('[data-mechanized-card]').querySelector('[data-mechanized-output]').textContent = `${this.value}%`"
            aria-label="درصد اجرای مکانیزه"
        >

        <p class="text-xs leading-6 text-slate-500 mt-4">
            این عدد نشان می‌دهد چه بخشی از اجرای واقعی فرایند در سیستم‌های نرم‌افزاری انجام می‌شود و می‌تواند در سنجش بلوغ دیجیتال فرایند استفاده شود.
        </p>
    </aside>
</div>
