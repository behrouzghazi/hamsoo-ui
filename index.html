<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمونه صفحات همسو</title>
    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .container {
            max-width: 720px;
            margin: 64px auto;
            padding: 24px;
        }
        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        ul {
            padding: 0;
            margin: 24px 0 0;
            list-style: none;
        }
        li + li {
            margin-top: 12px;
        }
        a {
            display: block;
            padding: 14px 16px;
            border-radius: 12px;
            text-decoration: none;
            background: #e2e8f0;
            color: #0f172a;
        }
        a:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>صفحات پروژه همسو</h1>
            <ul>
                <li><a href="worklist/index.html">ورود به Worklist</a></li>
                <li><a href="measure-catalog/index.html">ورود به Measure Catalog</a></li>
            </ul>
        </section>
    </main>
</body>
</html>
